<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bulba Office</title>
  <style>
    :root { --bg:#1b1f24; --panel:#262b33; --accent:#7ac07a; --text:#e8efe6; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%; background: var(--bg); color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      user-select: none;
    }
    h1 { font-size: 20px; margin: 10px 0 4px; }
    #game { line-height: 0; position: relative; }
    #game canvas { border: 3px solid #3a414c; border-radius: 8px; image-rendering: pixelated; }
    #hint { margin: 8px 0 14px; font-size: 13px; opacity: .85; display: flex; gap: 16px; }
    #hint b { color: var(--accent); }
    .hidden { display: none !important; }

    /* Кнопка выхода в другую локацию */
    #exitBtn { position: fixed; left: 50%; transform: translateX(-50%); bottom: 13vh; z-index: 25;
      display: flex; align-items: center; gap: 8px;
      background: var(--accent); color: #14210f; border: 3px solid #5aa05a; border-radius: 12px;
      padding: 10px 18px; font-family: inherit; font-size: 16px; font-weight: bold; cursor: pointer;
      box-shadow: 0 8px 28px rgba(0,0,0,.5); }
    #exitBtn:hover { transform: translateX(-50%) translateY(-2px); }
    #exitBtn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Меню выбора локации на парковке: поверх правой части кадра (пассажирское сиденье) */
    #parking {
      position: absolute; top: 50%; right: 4%; transform: translateY(-50%); z-index: 22;
      line-height: normal;
      display: flex; flex-direction: column; align-items: stretch; gap: clamp(6px, 1.2vw, 12px);
      padding: clamp(8px, 1.4vw, 18px); border-radius: 14px;
      background: rgba(27,31,36,.7); border: 2px solid #3a414c;
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
    }
    #parking h2 { margin: 0; font-size: clamp(13px, 1.6vw, 18px); text-align: center; }
    #parking p { margin: 0 0 4px; opacity: .75; font-size: clamp(10px, 1.1vw, 13px); text-align: center; }
    #parkingBtns { display: flex; flex-direction: column; gap: clamp(6px, 1vw, 10px); }
    .loc-btn {
      background: var(--panel); border: 2px solid var(--accent); border-radius: 12px;
      padding: clamp(7px, 1vw, 12px) clamp(12px, 1.8vw, 24px); cursor: pointer;
      color: var(--text); font-size: clamp(12px, 1.5vw, 17px); font-weight: bold;
      font-family: inherit; transition: .12s; text-align: center; white-space: nowrap;
    }
    .loc-btn:hover, .loc-btn.sel { background: var(--accent); color: #14210f; transform: translateX(-3px); }

    /* Выбор персонажа */
    #select {
      position: fixed; inset: 0; background: rgba(15,18,23,.96); z-index: 20;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; overflow: auto;
    }
    #select h2 { margin: 0 0 4px; }
    #select p { margin: 0 0 18px; opacity: .75; font-size: 14px; }
    #cards { display: grid; grid-template-columns: repeat(auto-fill, 132px); gap: 12px; max-width: 720px; justify-content: center; }
    .card { background: var(--panel); border: 2px solid #353c46; border-radius: 10px; padding: 8px; text-align: center; cursor: pointer; transition: .12s; }
    .card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .card canvas { display: block; margin: 0 auto 4px; border-radius: 50%; }
    .card .nm { font-weight: bold; font-size: 13px; }
    .card .rl { font-size: 11px; opacity: .7; }
    .card .loc { font-size: 10px; opacity: .5; margin-top: 2px; }

    /* Диалог и меню выбора игры */
    #dialogue, #gameMenu { position: fixed; inset: 0; pointer-events: none; z-index: 30; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 5vh; }
    .dlg-frame { pointer-events: auto; background: var(--panel); border: 3px solid var(--accent); border-radius: 16px; padding: 16px 22px; box-shadow: 0 12px 44px rgba(0,0,0,.55); }
    .dlg-title { text-align: center; font-weight: bold; margin-bottom: 12px; opacity: .9; }
    .dlg-options { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .opt { background: #f4f1e8; border: 2px solid var(--accent); border-radius: 999px; padding: 9px 20px; cursor: pointer; color: #1b1f24; font-size: 17px; font-family: inherit; transition: .12s; }
    .opt:hover, .opt.sel { background: var(--accent); color: #14210f; transform: translateY(-2px); }

    /* Полноэкранное окно игры */
    #bulbajump, #bulbapacker, #bulbaparking, #bulbaracing { position: fixed; inset: 0; z-index: 45; background: rgba(8,10,14,.9); display: flex; align-items: center; justify-content: center; padding: 24px; }
    #bjCanvas { background: #0e1620; border: 2px solid var(--accent); border-radius: 10px; image-rendering: pixelated; height: min(640px, 72vh); width: auto; aspect-ratio: 420 / 640; }
    #bpCanvas { background: #0e1620; border: 2px solid var(--accent); border-radius: 10px; image-rendering: pixelated; height: min(600px, 72vh); width: auto; aspect-ratio: 480 / 600; }
    #bpkCanvas { background: #26303a; border: 2px solid var(--accent); border-radius: 10px; image-rendering: pixelated; height: min(640px, 72vh); width: auto; aspect-ratio: 480 / 640; }
    #brCanvas { background: #3a3f47; border: 2px solid var(--accent); border-radius: 10px; image-rendering: pixelated; height: min(640px, 72vh); width: auto; aspect-ratio: 420 / 640; }
    .arcade-frame { position: relative; background: var(--panel); border: 3px solid var(--accent); border-radius: 16px; padding: 24px 30px; display: flex; flex-direction: column; align-items: center; gap: 14px; box-shadow: 0 12px 44px rgba(0,0,0,.55); }
    .arcade-title { margin: 0; font-size: 22px; }
    .arcade-close { position: absolute; top: -16px; right: -16px; width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); background: var(--panel); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .arcade-close:hover { background: var(--accent); color: #14210f; }
    .arcade-close svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }
    .arcade-min { position: absolute; top: -16px; left: -16px; width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); background: var(--panel); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .arcade-min:hover { background: var(--accent); color: #14210f; }
    .arcade-min svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }
    .ttt-status { font-size: 16px; opacity: .85; min-height: 20px; }
    .ttt-restart { background: var(--panel); border: 2px solid var(--accent); border-radius: 12px; padding: 8px 22px; color: var(--text); font-family: inherit; font-size: 15px; font-weight: bold; cursor: pointer; }
    .ttt-restart:hover { background: var(--accent); color: #14210f; }

    /* Слайды */
    #slides { position: fixed; inset: 0; z-index: 40; background: rgba(8,10,14,.82); display: flex; align-items: center; justify-content: center; padding: 24px; }
    .slides-box { position: relative; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .slides-media { max-width: min(900px, 86vw); max-height: 76vh; border: 3px solid var(--accent); border-radius: 10px; background: #11141a; }
    #slides:not(.pixel) #slidesCanvas { display: none; }
    #slides.pixel #slidesImg { display: none; }
    .slides-icon { position: absolute; top: -14px; width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--accent); background: var(--panel); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .slides-icon:hover { background: var(--accent); color: #14210f; }
    .slides-icon svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .slides-close { right: -14px; }
    .slides-full { left: -14px; }
    .slides-pixel { left: 30px; }
    .slides-full .ic-compress { display: none; }
    #slides.maximized .slides-full .ic-expand { display: none; }
    #slides.maximized .slides-full .ic-compress { display: block; }
    .slides-pixel .ic-normal { display: none; }
    #slides.pixel .slides-pixel .ic-pixelate { display: none; }
    #slides.pixel .slides-pixel .ic-normal { display: block; }
    .slides-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 48px; height: 64px; border: 2px solid var(--accent); border-radius: 10px; background: rgba(38,43,51,.85); color: var(--text); font-size: 28px; cursor: pointer; }
    .slides-nav:not(:disabled):hover { background: var(--accent); color: #14210f; }
    .slides-nav:disabled { opacity: .3; cursor: default; }
    .slides-nav.prev { left: -64px; }
    .slides-nav.next { right: -64px; }
    .slides-count { color: var(--text); opacity: .8; font-size: 14px; }

    /* Режим «во весь экран»: слайд растягивается по экрану */
    #slides.maximized { padding: 0; background: #0b0e12; }
    #slides.maximized .slides-box { width: 100vw; height: 100vh; justify-content: center; }
    #slides.maximized .slides-media { width: 100vw; height: 100vh; max-width: none; max-height: none; object-fit: contain; border: none; border-radius: 0; }
    #slides.maximized .slides-icon { top: 14px; }
    #slides.maximized .slides-close { right: 14px; }
    #slides.maximized .slides-full { left: 14px; }
    #slides.maximized .slides-pixel { left: 58px; }
    #slides.maximized .slides-nav.prev { left: 14px; }
    #slides.maximized .slides-nav.next { right: 14px; }
    #slides.maximized .slides-count { position: absolute; bottom: 12px; }
  </style>
  <script type="module" crossorigin src="/bulbasaur_office/assets/index-DPCsXMcc.js"></script>
</head>
<body>
  <h1>🌱 Bulba Office</h1>
  <div id="game">
    <div id="parking" class="hidden">
      <h2>Куда едем?</h2>
      <p>Выбери локацию.</p>
      <div id="parkingBtns"></div>
    </div>
  </div>
  <div id="hint"><span><b>Стрелки</b> / WASD — ходить</span><span><b>Пробел</b> — поговорить</span></div>

  <div id="select">
    <h2>Выбери Бульбазавра</h2>
    <p>Им будешь управлять. С остальными можно поговорить.</p>
    <div id="cards"></div>
  </div>

  <button id="exitBtn" class="hidden" aria-label="выйти">
    <svg viewBox="0 0 24 24"><path d="M4 21h12"/><path d="M6 21V4a1 1 0 0 1 1.2-.98l7 1.5A1 1 0 0 1 15 5.5v15"/><circle cx="11.5" cy="12" r="1"/></svg>
    <span id="exitLabel">Выйти</span>
  </button>

  <div id="dialogue" class="hidden">
    <div class="dlg-frame">
      <div class="dlg-options" id="dlgOptions"></div>
    </div>
  </div>

  <div id="gameMenu" class="hidden">
    <div class="dlg-frame">
      <div class="dlg-title">Выбери игру</div>
      <div class="dlg-options" id="gameMenuOptions"></div>
    </div>
  </div>

  <div id="bulbajump" class="hidden">
    <div class="arcade-frame">
      <button class="arcade-close" id="bjClose" aria-label="закрыть">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <button class="arcade-min" id="bjMin" aria-label="свернуть">
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
      </button>
      <h2 class="arcade-title">Bulba Jump</h2>
      <div class="ttt-status" id="bjStatus">Доставлено: 0</div>
      <canvas id="bjCanvas" width="420" height="640"></canvas>
      <button class="ttt-restart" id="bjRestart">Заново</button>
    </div>
  </div>

  <div id="bulbapacker" class="hidden">
    <div class="arcade-frame">
      <button class="arcade-close" id="bpClose" aria-label="закрыть">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <button class="arcade-min" id="bpMin" aria-label="свернуть">
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
      </button>
      <h2 class="arcade-title">Bulba Packer</h2>
      <div class="ttt-status" id="bpStatus">Очки: 0</div>
      <canvas id="bpCanvas" width="480" height="600"></canvas>
      <button class="ttt-restart" id="bpRestart">Заново</button>
    </div>
  </div>

  <div id="bulbaparking" class="hidden">
    <div class="arcade-frame">
      <button class="arcade-close" id="bpkClose" aria-label="закрыть">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <button class="arcade-min" id="bpkMin" aria-label="свернуть">
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
      </button>
      <h2 class="arcade-title">Bulba Parking</h2>
      <div class="ttt-status" id="bpkStatus">Стрелки: газ, задний ход и руль</div>
      <canvas id="bpkCanvas" width="480" height="640"></canvas>
      <button class="ttt-restart" id="bpkRestart">Заново</button>
    </div>
  </div>

  <div id="bulbaracing" class="hidden">
    <div class="arcade-frame">
      <button class="arcade-close" id="brClose" aria-label="закрыть">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <button class="arcade-min" id="brMin" aria-label="свернуть">
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
      </button>
      <h2 class="arcade-title">Bulba Racing</h2>
      <div class="ttt-status" id="brStatus">Очки: 0</div>
      <canvas id="brCanvas" width="420" height="640"></canvas>
      <button class="ttt-restart" id="brRestart">Заново</button>
    </div>
  </div>

  <div id="slides" class="hidden">
    <div class="slides-box">
      <button class="slides-icon slides-full" id="slidesFull" aria-label="во весь экран">
        <svg class="ic-expand" viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
        <svg class="ic-compress" viewBox="0 0 24 24"><path d="M8 3v3a2 2 0 0 1-2 2H3M21 8h-3a2 2 0 0 1-2-2V3M3 16h3a2 2 0 0 1 2 2v3M16 21v-3a2 2 0 0 1 2-2h3"/></svg>
      </button>
      <button class="slides-icon slides-pixel" id="slidesPixel" aria-label="пиксельный вид">
        <svg class="ic-pixelate" viewBox="0 0 24 24"><path d="M3 3h6v6H3zM15 3h6v6h-6zM3 15h6v6H3zM15 15h6v6h-6z"/></svg>
        <svg class="ic-normal" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 15l-5-5L7 20"/></svg>
      </button>
      <button class="slides-icon slides-close" id="slidesClose" aria-label="закрыть">
        <svg viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
      <button class="slides-nav prev" id="slidesPrev">‹</button>
      <img id="slidesImg" class="slides-media" alt="слайд" />
      <canvas id="slidesCanvas" class="slides-media"></canvas>
      <button class="slides-nav next" id="slidesNext">›</button>
      <div class="slides-count" id="slidesCount"></div>
    </div>
  </div>

</body>
</html>
